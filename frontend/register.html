<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OneDesk | Register</title>

    <link rel="icon"
          href="images/logo.jpeg">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <link rel="stylesheet"
          href="css/toast.css">

    <link rel="stylesheet"
          href="css/loader.css">

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

<div class="background">

<div class="blob blob1"></div>

<div class="blob blob2"></div>

</div>

<div class="login-wrapper">

<div class="left-side">

<img
src="images/logo.jpeg"
class="logo"
alt="OneDesk">

<h1>

OneDesk

</h1>

<p class="tagline">

Create your account and start organizing your work,
notes and health in one place.

</p>

<div class="features">

<div class="feature">

<i class="ti ti-user-plus"></i>

<span>

Create Your Account

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Unlimited Tasks

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Smart Notes

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Health Tracking

</span>

</div>

</div>

</div>

<div class="right-side">

<div class="login-card">

<div class="card-header">

<h2>

Create Account 🚀

</h2>

<p>

Join OneDesk and boost your productivity.

</p>

</div>

<form id="registerForm">

<div class="input-group">

<label>

Full Name

</label>

<div class="input-box">

<i class="ti ti-user"></i>

<input

type="text"

id="name"

placeholder="Enter your full name"

required>

</div>

</div>

<div class="input-group">

<label>

Email Address

</label>

<div class="input-box">

<i class="ti ti-mail"></i>

<input

type="email"

id="email"

placeholder="Enter your email"

required>

</div>

</div>

<div class="input-group">

<label>

Password

</label>

<div class="input-box">

    <i class="ti ti-lock-check"></i>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm password"
        required>

    <i
        class="ti ti-eye eye-toggle"
        id="toggleConfirmPassword">
    </i>

</div>

</div>

<div class="input-group">

<label>

Confirm Password

</label>

<div class="input-box">

<i class="ti ti-lock-check"></i>

<input

type="password"

id="confirmPassword"

placeholder="Confirm password"

required>

</div>

</div>

<button

type="submit"

class="login-btn">

<i class="ti ti-user-plus"></i>

Create Account

</button>
</form>

<div class="divider">

<span>

OR

</span>

</div>

<p class="register-text">

Already have an account?

<a href="login.html">

Login

</a>

</p>

<div class="footer">

<p>

© 2026 OneDesk

</p>

<p>

Built with ❤️ by Koushik

</p>

</div>

</div>

</div>

</div>

<script src="js/config.js"></script>

<script src="js/register.js"></script>

<script src="js/toast.js"></script>

<script src="js/loader.js"></script>

</body>

</html>
