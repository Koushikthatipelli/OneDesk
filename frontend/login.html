
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneDesk Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <div class="left-panel">

        <div class="brand">
            OneDesk
        </div>

        <div class="hero-content">

            <p class="tag">
                PRODUCTIVITY REDEFINED
            </p>

            <h1>
                Organize your work.
                Capture your ideas.
                Stay productive.
            </h1>

            <p class="description">
                One workspace for tasks,
                notes and productivity.
            </p>

        </div>

    </div>

    <div class="right-panel">

        <div class="login-card">

            <h2>
                Welcome Back
            </h2>

            <p class="subtitle">
                Sign in to continue to OneDesk
            </p>

            <form id="loginForm">

                <input
                    type="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>
<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>
</html>
