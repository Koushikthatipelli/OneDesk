<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OneDesk | Login</title>

    <link rel="icon"
          href="images/logo.jpeg">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <link rel="stylesheet"
          href="css/toast.css">

    <link rel="stylesheet"
          href="css/loader.css">

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

<div class="background">

<div class="blob blob1"></div>

<div class="blob blob2"></div>

</div>

<div class="login-wrapper">

<div class="left-side">

<img
src="images/logo.jpeg"
class="logo"
alt="OneDesk">

<h1>

OneDesk

</h1>

<p class="tagline">

Organize your work.

Track your health.

Stay productive.

</p>

<div class="features">

<div class="feature">

<i class="ti ti-check"></i>

<span>

Manage Tasks Easily

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Take Smart Notes

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Track Calories & Water

</span>

</div>

<div class="feature">

<i class="ti ti-check"></i>

<span>

Powerful Dashboard

</span>

</div>

</div>

</div>

<div class="right-side">

<div class="login-card">

<div class="card-header">

<h2>

Welcome Back 👋

</h2>

<p>

Sign in to continue using OneDesk.

</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>

Email Address

</label>

<div class="input-box">

<i class="ti ti-mail"></i>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="input-group">

<label>

Password

</label>

<div class="input-box">

<i class="ti ti-lock"></i>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

<i
class="ti ti-eye eye-toggle"
id="togglePassword">
</i>

</div>

</div>

<button
type="submit"
class="login-btn">

<i class="ti ti-login"></i>

Login

</button>
</form>

<div class="divider">

<span>

OR

</span>

</div>

<p class="register-text">

Don't have an account?

<a href="register.html">

Create Account

</a>

</p>

<div class="footer">

<p>

© 2026 OneDesk

</p>

<p>

Built with ❤️ by Koushik

</p>

</div>

</div>

</div>

</div>

<script src="js/config.js"></script>

<script src="js/login.js"></script>

<script src="js/loader.js"></script>

<script src="js/toast.js"></script>

</body>

</html>
