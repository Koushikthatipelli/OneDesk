
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Settings | OneDesk V3</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/settings.css">
</head>
<body>

<header id="navbar"></header>

<main class="page">
<div class="container">

<section class="hero">
<div>
<h1>Settings</h1>
<p class="hero-info">Customize your OneDesk experience.</p>
</div>
</section>

<section class="settings-grid">

<div class="settings-card">
<h2>Appearance</h2>
<label><input type="checkbox" id="darkMode" checked> Dark Mode</label>
<label><input type="checkbox" id="animations" checked> Enable Animations</label>
</div>

<div class="settings-card">
<h2>Notifications</h2>
<label><input type="checkbox" checked> Task Reminders</label>
<label><input type="checkbox" checked> Water Reminder</label>
<label><input type="checkbox"> Weekly Report</label>
</div>

<div class="settings-card">
<h2>Security</h2>
<button class="action-btn">Change Password</button>
<button class="action-btn danger-btn">Logout</button>
</div>

</section>

</div>
</main>

<script src="js/navbar.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
