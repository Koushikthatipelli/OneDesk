<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Tasks | OneDesk V3</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tasks.css">

</head>

<body>

<header id="navbar"></header>

<main class="page">

<div class="container">

<!-- ================= HERO ================= -->

<section class="task-hero">

<div>

<h1>Task Manager</h1>

<p>
Stay focused and complete your daily work.
</p>

</div>

<div class="hero-right">

<div class="progress-card">

<h2 id="progressPercent">
0%
</h2>

<p>
Today's Progress
</p>

</div>

</div>

</section>

<!-- ================= TOOLBAR ================= -->

<section class="toolbar">

<div class="search-box">

<i class="ti ti-search"></i>

<input
type="text"
id="searchTask"
placeholder="Search task...">

</div>

<div class="toolbar-buttons">

<button
class="filter-btn active"
data-filter="all">

All

</button>

<button
class="filter-btn"
data-filter="pending">

Pending

</button>

<button
class="filter-btn"
data-filter="completed">

Completed

</button>

<button
id="newTaskBtn"
class="add-btn">

<i class="ti ti-plus"></i>

Add Task

</button>

</div>

</section>

<!-- ================= ADD FORM ================= -->

<section
id="taskForm"
class="task-form"
style="display:none;">

<div class="form-grid">

<div class="input-group">

<label>

Task Name

</label>

<input
id="taskTitle"
type="text"
placeholder="Enter task title">

</div>

<div class="input-group">

<label>

Priority

</label>

<select id="taskPriority">

<option>

Low

</option>

<option>

Medium

</option>

<option>

High

</option>

</select>

</div>

<div class="input-group full">

<label>

Description

</label>

<textarea
id="taskDescription"
placeholder="Task description"></textarea>

</div>

<div class="input-group">

<label>

Due Date

</label>

<input
id="taskDate"
type="date">

</div>

<div class="input-group">

<label>

Category

</label>

<select id="taskCategory">

<option>

Work

</option>

<option>

Study

</option>

<option>

Personal

</option>

<option>

Fitness

</option>

</select>

</div>

</div>

<div class="form-actions">

<button
id="cancelTask"
class="secondary-btn">

Cancel

</button>

<button
id="saveTask"
class="primary-btn">

Save Task

</button>

</div>

</section>

<!-- ================= TASK LIST ================= -->

<section
class="task-list">

<div
id="emptyState"
class="empty-state">

<i class="ti ti-checklist"></i>

<h2>

No Tasks Yet

</h2>

<p>

Create your first task to get started.

</p>

</div>

<div
id="taskList">

<!-- JS renders task cards here -->

</div>

</section>

</div>

</main>

<script src="js/navbar.js"></script>
<script src="js/tasks.js"></script>

</body>
</html>
